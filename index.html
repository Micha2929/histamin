<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Histamin-Suche V4</title>
</head>
<body>
<h1>Histamin-Suche V4</h1>
<p>Basisversion mit den Datensätzen der V4.</p>
<input id="q" placeholder="Lebensmittel eingeben">
<button onclick="suche()">Suche</button>
<div id="result">Bitte Suchbegriff eingeben.</div>

<script>
const daten=[
{name:"Tomate",syn:["Tomaten","Paradeiser"],kat:"Gemüse"},
{name:"Frischkäse",syn:["Frischkaese"],kat:"Milchprodukte"},
{name:"Mozzarella",syn:[],kat:"Milchprodukte"},
{name:"Quark",syn:[],kat:"Milchprodukte"},
{name:"Apfel",syn:[],kat:"Obst"},
{name:"Birne",syn:[],kat:"Obst"},
{name:"Banane",syn:[],kat:"Obst"},
{name:"Kartoffel",syn:["Erdapfel"],kat:"Stärke"},
{name:"Hähnchen",syn:["Huhn","Haehnchen"],kat:"Fleisch"},
{name:"Kamillentee",syn:[],kat:"Getränke"},
{name:"Fencheltee",syn:[],kat:"Getränke"},
{name:"Brokkoli",syn:[],kat:"Gemüse"},
{name:"Blumenkohl",syn:[],kat:"Gemüse"},
{name:"Spinat",syn:[],kat:"Gemüse"},
{name:"Oregano",syn:[],kat:"Gewürze"},
{name:"Petersilie",syn:[],kat:"Gewürze"},
{name:"Walnuss",syn:[],kat:"Nüsse"},
{name:"Mandel",syn:[],kat:"Nüsse"}
];

function norm(t){
 return t.toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss').trim();
}
function suche(){
 let q=norm(document.getElementById('q').value);
 let e=daten.find(d=>norm(d.name)==q || d.syn.some(s=>norm(s)==q));
 document.getElementById('result').innerHTML=e ? '<h2>'+e.name+'</h2><p>Kategorie: '+e.kat+'</p>' : 'Kein Eintrag gefunden.';
 document.getElementById('q').value='';
}
</script>
</body>
</html>

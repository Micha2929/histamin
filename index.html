function suche() {
 const q = document.getElementById('suche').value.toLowerCase().trim();
 const out = document.getElementById('ergebnis');
 if(!q) { out.innerHTML=''; return; }

 const treffer = daten.filter(d =>
   String(d.Lebensmittel||'').toLowerCase().includes(q) ||
   String(d.Synonyme||'').toLowerCase().includes(q)
 );

 if(treffer.length===0){
   out.innerHTML='<p>Kein Treffer gefunden.</p>';
   return;
 }

 out.innerHTML = treffer.map(d => `
 <div class="card">
 <h2>${d.Lebensmittel}</h2>
 <p><span class="label">Kategorie:</span> ${d.Kategorie||''}</p>

}

<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Histamin-Datenbank</title>

<style>

body{
    font-family:Arial;
    margin:0;
    background:#f7f7f7;
}

main{
    max-width:700px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
}

.intro{
    text-align:center;
    margin-bottom:16px;
}

input{
    width:100%;
    max-width:520px;
    box-sizing:border-box;
    padding:14px;
    font-size:1.1rem;
    border:2px solid #888;
    border-radius:10px;
    background:#fff;
    appearance:none;
    -webkit-appearance:none;
}

input:focus{
    outline:none;
    border:2px solid #005fcc;
    box-shadow:none;
}

#ergebnis{
    width:100%;
    min-height:420px;
    margin-top:20px;
    overflow-y:auto;
    background:#fff;
    border:2px solid #ddd;
    border-radius:10px;
    padding:16px;
    box-sizing:border-box;
}

.card{
    background:#fff;
    padding:12px 0;
    border-bottom:1px solid #ccc;
}

.card:last-child{
    border-bottom:none;
}

.card h2{
    margin:0 0 8px 0;
    font-size:1.2rem;
}

.card h3{
    margin:10px 0 4px 0;
    font-size:1rem;
}

.card p{
    margin:4px 0;
    line-height:1.4;
}

.trefferbutton{
    width:100%;
    text-align:left;
    padding:12px;
    margin:4px 0;
    border:1px solid #ccc;
    border-radius:8px;
    background:#fff;
    font-size:1rem;
}

.links{
    width:100%;
    margin-top:20px;
}

</style>

</head>

<body>

<main>

<div class="intro">
<p>Willkommen bei der Histamin-Datenbank.</p>
</div>

<input
    id="suche"
    type="search"
    placeholder="Lebensmittel eingeben"
    aria-label="Lebensmittel suchen">

<div id="ergebnis" aria-live="polite">
    <p>Geben Sie oben ein Lebensmittel ein, um die Suche zu starten.</p>
</div>

<div class="links">

<h2>Weitere Informationen</h2>

<ul>
<li>Begriffserklärungen</li>
<li>Ein Lebensmittel fehlt?</li>
<li>Über dieses Projekt</li>
<li>Qualitäts- und Haftungshinweise</li>
</ul>

</div>

</main>

<script>

let daten=[];
let treffer=[];

fetch("daten.json")
.then(r => r.json())
.then(d => {
    daten=d;
})
.catch(err => {
    document.getElementById("ergebnis").innerHTML =
    "<div class='card'>Fehler beim Laden der daten.json</div>";
});

const s=document.getElementById("suche");
const e=document.getElementById("ergebnis");

function bewertungText(b){

    if(b==="🟢") return "🟢 Meist gut verträglich";
    if(b==="🟡") return "🟡 Individuell testen";
    if(b==="🟠") return "🟠 Eher unverträglich";
    if(b==="🔴") return "🔴 Meist unverträglich";

    return b || "";
}

function zeigeDetail(x){

    e.innerHTML=

    "<div class='card'>"

    +

    "<h2>"+x.lebensmittel+"</h2>"

    +

    "<p><strong>"+bewertungText(x.bewertung)+"</strong></p>"

    +

    (x.grund ?
    "<h3>Grund</h3><p>"+x.grund+"</p>"
    : "")

    +

    (x.hinweis ?
    "<h3>Hinweis</h3><p>"+x.hinweis+"</p>"
    : "")

    +

    (x.kategorie ?
    "<p><small>"+x.kategorie+"</small></p>"
    : "")

    +

    "</div>";
}

function zeigeTreffer(index){
    zeigeDetail(treffer[index]);
}

s.oninput=()=>{

    const q=s.value.trim().toLowerCase();

    if(!q){
        e.innerHTML='<p>Geben Sie oben ein Lebensmittel ein, um die Suche zu starten.</p>';
        return;
    }

    treffer=daten.filter(x=>

        (x.lebensmittel || "").toLowerCase().includes(q)

        ||

        ((x.synonyme || "").toLowerCase().includes(q))

    );

    if(treffer.length===0){

        e.innerHTML="<div class='card'>Kein Treffer gefunden.</div>";
        return;
    }

    if(treffer.length>10){

        e.innerHTML="<div class='card'>Bitte verfeinern Sie Ihre Suche.</div>";
        return;
    }

    if(treffer.length>=4){

        e.innerHTML=
        "<div class='card'><h2>Trefferliste</h2>" +

        treffer.map((x,i)=>

            "<button class='trefferbutton' onclick='zeigeTreffer("+i+")'>"
            +x.lebensmittel+
            "</button>"

        ).join("")

        +

        "</div>";

        return;
    }

    e.innerHTML="";

    treffer.forEach(x=>{
        e.innerHTML +=
        "<div class='card'>"

        +

        "<h2>"+x.lebensmittel+"</h2>"

        +

        "<p><strong>"+bewertungText(x.bewertung)+"</strong></p>"

        +

        (x.grund ?
        "<h3>Grund</h3><p>"+x.grund+"</p>"
        : "")

        +

        (x.hinweis ?
        "<h3>Hinweis</h3><p>"+x.hinweis+"</p>"
        : "")

        +

        (x.kategorie ?
        "<p><small>"+x.kategorie+"</small></p>"
        : "")

        +

        "</div>";
    });

}

</script>

</body>
</html>

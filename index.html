<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Histamin-Suche</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: auto;
    padding: 20px;
    line-height: 1.5;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    box-sizing: border-box;
}

button {
    margin-top: 10px;
    padding: 12px 20px;
    font-size: 18px;
}

#ergebnis {
    margin-top: 25px;
    padding: 15px;
    border: 1px solid #ccc;
}
</style>

</head>

<body>

<h1>Histamin-Lebensmittelsuche</h1>

<label for="suche">
Lebensmittel eingeben:
</label>

<input
id="suche"
type="text"
aria-label="Lebensmittel eingeben">

<br>

<button onclick="suche()">
Suchen
</button>

<div
id="ergebnis"
tabindex="-1"
aria-live="polite">

Noch keine Suche durchgeführt.

</div>

<script>

const daten = {

"apfel":
["Obst","Histaminfrei","Frisch meist gut verträglich"],

"banane":
["Obst","Histaminarm","Reifegrad beachten"],

"tomate":
["Gemüse","Histaminrisiko","Häufig problematisch"],

"kartoffel":
["Gemüse","Histaminfrei","Sehr gut geeignet"],

"gurke":
["Gemüse","Histaminfrei","Gut verträglich"],

"joghurt":
["Milchprodukte","Histaminarm","Fermentiert"],

"reis":
["Getreide","Histaminfrei","Sehr gut geeignet"],

"wein":
["Getränke","Histaminrisiko","Histaminreich"]

};

function suche() {

const eingabe = document
.getElementById("suche")
.value
.toLowerCase()
.trim();

const ausgabe =
document.getElementById("ergebnis");

if (!eingabe) {

ausgabe.innerHTML =
"<h2>Ergebnis</h2><p>Bitte ein Lebensmittel eingeben.</p>";

return;

}

const treffer = Object.keys(daten)
.filter(name =>
name.toLowerCase().includes(eingabe)
);

if (treffer.length === 0) {

ausgabe.innerHTML =
"<h2>Ergebnis</h2><p>Kein Lebensmittel gefunden.</p>";

}
else {

let html =
"<h2>Ergebnis</h2>" +
"<p>" + treffer.length +
" Treffer gefunden</p>";

treffer.forEach(name => {

html +=
"<p><strong>" +
name.charAt(0).toUpperCase() +
name.slice(1) +
"</strong><br>" +

"Kategorie: " +
daten[name][0] +
"<br>" +

"Einstufung: " +
daten[name][1] +
"<br>" +

"Hinweis: " +
daten[name][2] +
"</p>";

});

ausgabe.innerHTML = html;

}

document.getElementById("suche").value = "";
document.getElementById("suche").focus();

}

function zuruecksetzen() {

document.getElementById("suche").value = "";

document.getElementById("ergebnis").innerHTML =
"Noch keine Suche durchgeführt.";

document.getElementById("suche").focus();

}

document
.getElementById("suche")
.addEventListener("keydown", function(event){

if(event.key === "Enter"){
suche();
}

});

</script>

</script>

</body>
</html>

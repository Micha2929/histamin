function normalizeText(text) {
  return String(text || "")
    .toLowerCase()
    .replace(/ä/g, "ae")
    .replace(/ö/g, "oe")
    .replace(/ü/g, "ue")
    .replace(/ß/g, "ss")
    .trim();
}

function suche() {
  const q = normalizeText(document.getElementById("suche").value);
  const out = document.getElementById("ergebnis");

  if (!q) {
    out.innerHTML = "";
    return;
  }

  const treffer = daten.filter(d =>
    normalizeText(d["Lebensmittel"]).includes(q) ||
    normalizeText(d["Synonyme"]).includes(q)
  );

  if (treffer.length === 0) {
    out.innerHTML = "<p>Kein Treffer gefunden.</p>";
    return;
  }

  out.innerHTML = treffer.map(d => `
    <div class="card">
      <h2>${d["Lebensmittel"]}</h2>
      <p><span class="label">Kategorie:</span> ${d["Kategorie"] || ""}</p>
      <p><span class="label">Einstufung:</span> ${d["Einstufung"] || ""}</p>
      <p><span class="label">Grund:</span> ${d["Grund"] || ""}</p>
      <p><span class="label">Hinweis:</span> ${d["Hinweis"] || ""}</p>
    </div>
  `).join("");
}

document.getElementById("suche").addEventListener("input", suche);
